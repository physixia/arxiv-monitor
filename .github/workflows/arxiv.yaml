name: arXiv Monitor

on:
  schedule:
    - cron: "30 2,14 * * *"
  push:
    branches:
      - feature/**
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install feedparser requests

      - name: Run monitor
        run: python monitor.py
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          CHANNEL_CO: ${{ secrets.CHANNEL_CO }}
          CHANNEL_EP: ${{ secrets.CHANNEL_EP }}
          CHANNEL_GA: ${{ secrets.CHANNEL_GA }}
          CHANNEL_HE: ${{ secrets.CHANNEL_HE }}
          CHANNEL_IM: ${{ secrets.CHANNEL_IM }}
          CHANNEL_SR: ${{ secrets.CHANNEL_SR }}
          CHANNEL_ABSTRACT: ${{ secrets.CHANNEL_ABSTRACT }}
          CHANNEL_LOG: ${{ secrets.CHANNEL_LOG }}

      - name: Commit updated IDs
        run: |
          git config user.name github-actions
          git config user.email actions@github.com
          git add seen_ids.json
          git commit -m "update seen ids" || echo "no changes"
          git push
